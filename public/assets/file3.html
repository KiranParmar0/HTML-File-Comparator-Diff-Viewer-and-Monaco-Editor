<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Sample Page 3</title>
        <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Open Sans', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            max-width: 500px;
            width: 90%;
        }
        h1 {
            color: #667eea;
            margin-bottom: 15px;
            text-align: center;
        }
        p {
            color: #666;
            line-height: 1.8;
            margin-bottom: 20px;
        }
        .features {
            list-style: none;
            margin: 20px 0;
        }
        .features li {
            padding: 8px 0;
            color: #555;
        }
        .features li:before {
            content: "✓ ";
            color: #764ba2;
            font-weight: bold;
            margin-right: 8px;
        }
        .button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            font-size: 16px;
            transition: transform 0.2s;
        }
        .button:hover {
            transform: scale(1.05);
        }
    </style>
    </head>
    <body>
        <div class="container">
            <h1>Welcome to Page 1</h1>
            <h1>Welcome to Page 3 - Modern Design</h1>
            <p>This is the final version with modern styling and features.</p>
            <ul class="features">
                <li>Responsive design</li>
                <li>Modern gradient background</li>
                <li>Better user experience</li>
                <li>Enhanced styling</li>
            </ul>
            <button class="button">Get Started</button>
        </div>
    </body>
</html>
